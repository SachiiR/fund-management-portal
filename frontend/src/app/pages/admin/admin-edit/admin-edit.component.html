<div class="edit-page container py-4">

    <!-- Loading -->
    <div *ngIf="loading" class="text-center py-5">
      <div class="spinner-border text-primary mb-3" style="width: 3.5rem; height: 3.5rem;" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
      <p class="text-muted">Loading fund data...</p>
    </div>
  
    <!-- Error -->
    <div *ngIf="error && !loading" class="alert alert-danger text-center py-4 shadow-sm rounded-3">
      <i class="bi bi-exclamation-triangle-fill fs-3 me-2"></i>
      {{ error }}
      <div class="mt-3">
        <button class="btn btn-outline-secondary px-4" (click)="cancel()">Back</button>
      </div>
    </div>
  
    <!-- Form -->
    <ng-container *ngIf="fund && !loading && !error">
      <div class="card shadow border-0 rounded-3 overflow-hidden">
  
        <!-- Header -->
        <div class="card-header bg-primary text-white px-4 py-3 d-flex justify-content-between align-items-center">
          <h4 class="mb-0 fw-bold">Edit Fund: {{ fund.name }}</h4>
          <div>
            <button class="btn btn-sm btn-light me-2" (click)="cancel()">
              Cancel
            </button>
            <button class="btn btn-sm btn-danger" (click)="deleteFund()" [disabled]="saving">
              Delete Fund
            </button>
          </div>
        </div>
  
        <!-- Form Body -->
        <div class="card-body px-4 py-4 bg-light">
          <div class="row g-4">
  
            <!-- Name -->
            <div class="col-md-12">
              <label class="form-label fw-semibold">Fund Name</label>
              <input type="text" class="form-control" [(ngModel)]="fund.name"
                     (blur)="onFieldChange('name', fund.name)" [disabled]="saving">
            </div>
  
            <!-- Description -->
            <div class="col-md-12">
              <label class="form-label fw-semibold">Description</label>
              <textarea class="form-control" rows="4" [(ngModel)]="fund.description"
                        (blur)="onFieldChange('description', fund.description)" [disabled]="saving"></textarea>
            </div>
  
            <!-- Currency -->
            <div class="col-md-4">
              <label class="form-label fw-semibold">Currency</label>
              <select class="form-select" [(ngModel)]="fund.currency"
                      (change)="onFieldChange('currency', fund.currency)" [disabled]="saving">
                <option value="USD">USD</option>
                <option value="CAD">CAD</option>
                <option value="EUR">EUR</option>
                <option value="GBP">GBP</option>
                <!-- Add more currencies as needed -->
              </select>
            </div>
  
            <!-- Fund Size -->
            <div class="col-md-4">
              <label class="form-label fw-semibold">Fund Size (M)</label>
              <input type="number" class="form-control" [(ngModel)]="fund.fundSize"
                     (blur)="onFieldChange('fundSize', fund.fundSize)" [disabled]="saving">
            </div>
  
            <!-- Vintage -->
            <div class="col-md-4">
              <label class="form-label fw-semibold">Vintage Year</label>
              <input type="number" class="form-control" [(ngModel)]="fund.vintage"
                     (blur)="onFieldChange('vintage', fund.vintage)" [disabled]="saving">
            </div>
  
<!-- Strategies -->
<div class="col-md-12">
    <label class="form-label fw-semibold">Strategies (comma separated)</label>
    <input type="text" class="form-control"
           [ngModel]="fund.strategies.join(', ')"
           (blur)="onArrayFieldChange($event, 'strategies')"
           [disabled]="saving">
  </div>
  
  <!-- Geographies -->
  <div class="col-md-12">
    <label class="form-label fw-semibold">Geographies (comma separated)</label>
    <input type="text" class="form-control"
           [ngModel]="fund.geographies.join(', ')"
           (blur)="onArrayFieldChange($event, 'geographies')"
           [disabled]="saving">
  </div>
  
  <!-- Managers -->
  <div class="col-md-12">
    <label class="form-label fw-semibold">Managers (comma separated)</label>
    <input type="text" class="form-control"
           [ngModel]="fund.managers.join(', ')"
           (blur)="onArrayFieldChange($event, 'managers')"
           [disabled]="saving">
  </div>
          </div>
  
          <!-- Saving Indicator -->
          <div class="text-center mt-4" *ngIf="saving">
            <div class="spinner-border spinner-border-sm text-primary me-2" role="status"></div>
            <span class="text-muted">Saving...</span>
          </div>
        </div>
  
        <!-- Footer -->
        <div class="card-footer bg-light px-4 py-3 d-flex justify-content-end border-top">
          <button class="btn btn-outline-secondary me-3" (click)="cancel()">
            Cancel
          </button>
          <button class="btn btn-danger" (click)="deleteFund()" [disabled]="saving">
            Delete Fund
          </button>
        </div>
      </div>
    </ng-container>
  </div>
