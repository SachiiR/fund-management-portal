<div class="edit-page container py-4" (click)="onOutsideClick($event)">
  <!-- Loading -->
  <div *ngIf="loading" class="text-center py-5">
    <div
      class="spinner-border text-primary mb-3"
      style="width: 3.5rem; height: 3.5rem"
      role="status"
    >
      <span class="visually-hidden">Loading...</span>
    </div>
    <p class="text-muted">Loading fund data...</p>
  </div>

  <!-- Error -->
  <div
    *ngIf="error && !loading"
    class="alert alert-danger text-center py-4 shadow-sm rounded-3"
  >
    <i class="bi bi-exclamation-triangle-fill fs-3 me-2"></i>
    {{ error }}
    <div class="mt-3">
      <button class="btn btn-outline-secondary px-4" (click)="cancel()">
        Back
      </button>
    </div>
  </div>

  <!-- Form -->
  <ng-container *ngIf="fund && !loading && !error">
    <div class="card shadow border-0 rounded-3 overflow-hidden">
      <!-- Header -->
      <div
        class="card-header bg-primary text-white px-4 py-3 d-flex justify-content-between align-items-center"
      >
        <h4 class="mb-0 fw-bold">{{ fund.name }}</h4>
        <div>
          <button class="btn btn-sm btn-light px-3" (click)="saveAndGoBack()">
            Back
          </button>
          <!-- <button class="btn btn-sm btn-danger" (click)="deleteFund()" [disabled]="saving">
              Delete Fund
            </button> -->
        </div>
      </div>

      <!-- Form Body -->
      <div class="card-body px-4 py-4 bg-light">
        <div class="row g-4">
          <!-- Name -->
          <!-- <div class="col-md-12">
              <label class="form-label fw-semibold">Fund Name</label>
              <input type="text" class="form-control" [(ngModel)]="fund.name"
                     (blur)="onFieldChange('name', fund.name)" [disabled]="saving">
            </div> -->

          <!-- Description -->
          <div class="col-md-12">
            <label class="form-label fw-semibold">Description</label>
            <textarea
              class="form-control"
              rows="4"
              [(ngModel)]="fund.description"
              (blur)="onFieldChange('description', fund.description)"
              [disabled]="saving"
            ></textarea>
          </div>

          <!-- Currency -->
          <div class="col-md-4">
            <label class="form-label fw-semibold">Currency</label>
            <select
              class="form-select"
              [(ngModel)]="fund.currency"
              (change)="onFieldChange('currency', fund.currency)"
              [disabled]="saving"
            >
              <option *ngFor="let c of currencies" [value]="c">{{ c }}</option>
            </select>
          </div>

          <!-- Fund Size -->
          <div class="col-md-4">
            <label class="form-label fw-semibold">Fund Size (M)</label>
            <input
              type="number"
              class="form-control"
              [(ngModel)]="fund.fundSize"
              (blur)="onFieldChange('fundSize', fund.fundSize)"
              [disabled]="saving"
            />
          </div>

          <!-- Vintage -->
          <div class="col-md-4">
            <label class="form-label fw-semibold">Vintage Year</label>
            <input
              type="number"
              class="form-control"
              [(ngModel)]="fund.vintage"
              (blur)="onFieldChange('vintage', fund.vintage)"
              [disabled]="saving"
            />
          </div>

    <!-- Strategies -->
    <div class="filter-dropdown" (click)="$event.stopPropagation()">
        <button class="filter-btn" type="button" (click)="toggleDropdown('strategies')">
          {{ fund.strategies.length ? fund.strategies.join(', ') : 'Select strategies...' }}
          <i class="bi bi-chevron-down ms-1"></i>
        </button>
      
        <div class="dropdown-menu-custom" *ngIf="openDropdown === 'strategies'">
          <label *ngFor="let s of strategies" class="dropdown-item-custom">
            <input type="checkbox" [checked]="fund.strategies.includes(s)"
                   (change)="toggleItem('strategies', s)">
            {{ s }}
          </label>
        </div>
      </div>
  
  <!-- Geographies -->
  <div class="col-md-12">
    <label class="form-label fw-semibold">Geographies</label>
    <div class="filter-dropdown position-relative">
      <button class="filter-btn form-control text-start" type="button" (click)="toggleDropdown('geographies')">
        {{ fund.geographies.length ? fund.geographies.join(', ') : 'Select geographies...' }}
        <i class="bi bi-chevron-down ms-2"></i>
      </button>
      <div class="dropdown-menu-custom shadow" *ngIf="openDropdown === 'geographies'">
        <label *ngFor="let g of geographies" class="dropdown-item-custom">
          <input type="checkbox" [checked]="fund.geographies.includes(g)"
                 (change)="toggleItem('geographies', g)">
          {{ g }}
        </label>
      </div>
    </div>
  </div>
  
  <!-- Managers -->
  <div class="col-md-12">
    <label class="form-label fw-semibold">Managers</label>
    <div class="filter-dropdown" (click)="$event.stopPropagation()">
      <button class="filter-btn" type="button" (click)="toggleDropdown('managers')">
        {{ fund.managers.length ? fund.managers.join(', ') : 'Select managers...' }}
        <i class="bi bi-chevron-down ms-1"></i>
      </button>
      <div class="dropdown-menu-custom" *ngIf="openDropdown === 'managers'">
        <label *ngFor="let m of managers" class="dropdown-item-custom">
          <input type="checkbox" [checked]="fund.managers.includes(m)"
                 (change)="toggleItem('managers', m)">
          {{ m }}
        </label>
      </div>
    </div>
  </div>
        </div>

        <!-- Saving Indicator -->
        <div class="text-center mt-4" *ngIf="saving">
          <div
            class="spinner-border spinner-border-sm text-primary me-2"
            role="status"
          ></div>
          <span class="text-muted">Saving...</span>
        </div>
      </div>

      <!-- Footer -->
      <div
        class="card-footer bg-light px-4 py-3 d-flex justify-content-end border-top"
      >
        <button class="btn btn-outline-secondary me-3" (click)="cancel()">
          Cancel
        </button>
        <!-- <button
          class="btn btn-danger"
          (click)="deleteFund()"
          [disabled]="saving"
        >
          Delete Fund
        </button> -->
        <button class="btn btn-danger" (click)="openDeleteModal(deleteModal)" [disabled]="saving">
            Delete Fund
          </button>
      </div>
    </div>
    <!-- Delete Confirmation Modal -->
<ng-template #deleteModal let-modal>
    <div class="modal-header border-0 pb-0">
      <h5 class="modal-title fw-bold text-danger">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>Delete Fund
      </h5>
      <button type="button" class="btn-close" (click)="modal.dismiss()"></button>
    </div>
    <div class="modal-body py-3">
      <p class="mb-0">Are you sure you want to delete <strong>{{ fund?.name }}</strong>? This action cannot be undone.</p>
    </div>
    <div class="modal-footer border-0 pt-0">
      <button class="btn btn-outline-secondary" (click)="modal.dismiss()">Cancel</button>
      <button class="btn btn-danger" (click)="modal.close('confirm')">
        <i class="bi bi-trash me-1"></i>Delete
      </button>
    </div>
  </ng-template>
  </ng-container>
</div>
